<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 560" font-family="'Segoe UI', Inter, system-ui, sans-serif">

  <!-- Background -->
  <rect width="1100" height="560" fill="#F0F4F8"/>

  <!-- Title -->
  <text x="550" y="36" text-anchor="middle" font-size="20" font-weight="700" fill="#1B3139">Motz Demo — Plataforma de Logística com IA</text>
  <text x="550" y="56" text-anchor="middle" font-size="12" fill="#5A6E7F">Ciclo completo: dados sintéticos → Delta Lake → IA conversacional → dashboards em tempo real</text>

  <!-- ===== CYCLE ARROW (background arc) ===== -->
  <path d="M 120 280 Q 550 520 980 280" stroke="#D1D9E0" stroke-width="3" fill="none" stroke-dasharray="8,4"/>

  <!-- ===== BOX 1: CAMPO / MOTORISTA ===== -->
  <g transform="translate(30,130)">
    <rect width="160" height="180" rx="14" fill="#FFFFFF" stroke="#D1D9E0" stroke-width="2"/>
    <!-- phone icon -->
    <rect x="55" y="18" width="50" height="80" rx="8" fill="#1B3139"/>
    <rect x="60" y="24" width="40" height="64" rx="3" fill="#E8F4FD"/>
    <rect x="68" y="58" width="25" height="12" rx="3" fill="#25D366"/>
    <text x="69" y="66" font-size="6" fill="#FFF">Olá Motz!</text>
    <circle cx="80" cy="22" r="2" fill="#3A4A59"/>
    <circle cx="80" cy="100" r="3.5" fill="#3A4A59"/>
    <text x="80" y="120" text-anchor="middle" font-size="12" font-weight="700" fill="#1B3139">Motorista</text>
    <text x="80" y="135" text-anchor="middle" font-size="10" fill="#5A6E7F">Envia texto</text>
    <text x="80" y="149" text-anchor="middle" font-size="10" fill="#5A6E7F">ou áudio via</text>
    <text x="80" y="163" text-anchor="middle" font-size="10" fill="#5A6E7F">WhatsApp Sim.</text>
  </g>

  <!-- Arrow 1 -->
  <path d="M 192 220 L 248 220" stroke="#FF3621" stroke-width="2.5" fill="none" marker-end="url(#cioarr)"/>
  <text x="220" y="212" text-anchor="middle" font-size="9" fill="#FF3621" font-weight="600">voz / texto</text>

  <!-- ===== BOX 2: DATABRICKS APPS ===== -->
  <g transform="translate(248,100)">
    <rect width="190" height="240" rx="14" fill="#FFFFFF" stroke="#1B3139" stroke-width="2"/>
    <!-- Databricks header -->
    <rect width="190" height="42" rx="14" fill="#1B3139"/>
    <rect y="22" width="190" height="20" fill="#1B3139"/>
    <polygon points="16,10 26,16 16,22 6,16" fill="#FF3621"/>
    <polygon points="28,10 38,16 28,22 18,16" fill="#FF3621" opacity="0.8"/>
    <polygon points="22,22 32,28 22,34 12,28" fill="#FF3621" opacity="0.6"/>
    <text x="44" y="21" font-size="11" font-weight="700" fill="#FFFFFF">Databricks Apps</text>
    <text x="44" y="34" font-size="9" fill="#A0B4C0">React + FastAPI</text>

    <text x="95" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#1B3139">App hospedado</text>
    <text x="95" y="82" text-anchor="middle" font-size="9" fill="#5A6E7F">Frontend React 18</text>
    <text x="95" y="96" text-anchor="middle" font-size="9" fill="#5A6E7F">Backend FastAPI</text>

    <line x1="16" y1="108" x2="174" y2="108" stroke="#EEF0F4" stroke-width="1"/>

    <text x="95" y="126" text-anchor="middle" font-size="10" font-weight="700" fill="#1B3139">Agente IA</text>
    <!-- Claude A badge -->
    <circle cx="50" cy="160" r="22" fill="#CC785C"/>
    <text x="50" y="166" text-anchor="middle" font-size="18" fill="#FFFFFF" font-weight="800">A</text>
    <text x="50" y="183" text-anchor="middle" font-size="8" fill="#666">Claude 4.6</text>

    <!-- Whisper badge -->
    <circle cx="140" cy="160" r="22" fill="#7B2D8B"/>
    <text x="140" y="166" text-anchor="middle" font-size="18" fill="#FFFFFF">🎙</text>
    <text x="140" y="183" text-anchor="middle" font-size="8" fill="#666">Whisper v3</text>

    <text x="95" y="210" text-anchor="middle" font-size="9" fill="#5A6E7F">LLM · Speech-to-Text</text>
    <text x="95" y="224" text-anchor="middle" font-size="8" fill="#8899A6" font-style="italic">Model Serving endpoints</text>
  </g>

  <!-- Arrow 2 -->
  <path d="M 440 220 L 496 220" stroke="#FF3621" stroke-width="2.5" fill="none" marker-end="url(#cioarr)"/>
  <text x="468" y="212" text-anchor="middle" font-size="9" fill="#FF3621" font-weight="600">SDK / SQL</text>

  <!-- ===== BOX 3: DATABRICKS PLATFORM ===== -->
  <g transform="translate(496,80)">
    <rect width="320" height="280" rx="14" fill="#FAFAFA" stroke="#FF3621" stroke-width="2.5"/>
    <!-- Databricks header -->
    <rect width="320" height="46" rx="14" fill="#1B3139"/>
    <rect y="24" width="320" height="22" fill="#1B3139"/>
    <polygon points="16,10 27,16.5 16,23 5,16.5" fill="#FF3621"/>
    <polygon points="29,10 40,16.5 29,23 18,16.5" fill="#FF3621" opacity="0.85"/>
    <polygon points="22.5,23 33.5,29.5 22.5,36 11.5,29.5" fill="#FF3621" opacity="0.7"/>
    <text x="47" y="24" font-size="12" font-weight="700" fill="#FFFFFF">Databricks Platform</text>
    <text x="47" y="38" font-size="9" fill="#A0B4C0">Data + AI + Governance</text>

    <!-- Delta Lake / Unity Catalog -->
    <rect x="10" y="58" width="140" height="105" rx="8" fill="#EEF4FF" stroke="#0066CC" stroke-width="1.2"/>
    <circle cx="26" cy="72" r="10" fill="#0066CC"/>
    <text x="26" y="76" text-anchor="middle" font-size="8" fill="#FFFFFF" font-weight="700">UC</text>
    <text x="42" y="69" font-size="10" font-weight="700" fill="#003D8F">Unity Catalog</text>
    <text x="42" y="81" font-size="9" fill="#5A6E7F">+ Delta Lake</text>
    <polygon points="18,92 27,80 36,92" fill="#0066CC" opacity="0.7"/>
    <text x="40" y="94" font-size="9" fill="#1B3139">motoristas · cargas</text>
    <text x="40" y="108" font-size="9" fill="#1B3139">transportadoras</text>
    <text x="40" y="122" font-size="9" fill="#1B3139">embarcadores · conversas</text>
    <text x="18" y="155" font-size="8" fill="#8899A6" font-style="italic">~50k registros</text>

    <!-- Lakebase -->
    <rect x="160" y="58" width="148" height="105" rx="8" fill="#E8F6FF" stroke="#0066CC" stroke-width="1.2"/>
    <text x="234" y="75" text-anchor="middle" font-size="18">🐘</text>
    <text x="234" y="94" text-anchor="middle" font-size="10" font-weight="700" fill="#003D8F">Lakebase</text>
    <text x="234" y="108" text-anchor="middle" font-size="9" fill="#5A6E7F">PostgreSQL gerenciado</text>
    <text x="234" y="122" text-anchor="middle" font-size="9" fill="#5A6E7F">Autoscaling</text>
    <text x="234" y="136" text-anchor="middle" font-size="9" fill="#5A6E7F">Branching nativo</text>
    <text x="234" y="155" font-size="8" fill="#8899A6" font-style="italic">motz-demo · production</text>

    <!-- SQL Warehouse -->
    <rect x="10" y="173" width="140" height="90" rx="8" fill="#F0FFF8" stroke="#009688" stroke-width="1.2"/>
    <ellipse cx="28" cy="185" rx="10" ry="5" fill="#009688"/>
    <rect x="18" y="185" width="20" height="10" fill="#007A6A"/>
    <ellipse cx="28" cy="195" rx="10" ry="5" fill="#007A6A"/>
    <text x="44" y="184" font-size="10" font-weight="700" fill="#005A4A">SQL Warehouse</text>
    <text x="44" y="196" font-size="9" fill="#5A6E7F">DBSQL Serverless</text>
    <text x="18" y="215" font-size="9" fill="#5A6E7F">Queries em tempo real</text>
    <text x="18" y="229" font-size="9" fill="#5A6E7F">Métricas de negócio</text>
    <text x="18" y="255" font-size="8" fill="#8899A6" font-style="italic">motz_demo schema</text>

    <!-- MLflow -->
    <rect x="160" y="173" width="148" height="90" rx="8" fill="#F8F0FF" stroke="#8E44AD" stroke-width="1.2"/>
    <text x="234" y="195" text-anchor="middle" font-size="22">⚗️</text>
    <text x="234" y="214" text-anchor="middle" font-size="10" font-weight="700" fill="#5A0080">MLflow</text>
    <text x="234" y="228" text-anchor="middle" font-size="9" fill="#5A6E7F">Model Registry</text>
    <text x="234" y="242" text-anchor="middle" font-size="9" fill="#5A6E7F">Whisper large-v3</text>
    <text x="234" y="255" font-size="8" fill="#8899A6" font-style="italic">versionamento e deploy</text>
  </g>

  <!-- Arrow 3 -->
  <path d="M 818 220 L 868 220" stroke="#FF3621" stroke-width="2.5" fill="none" marker-end="url(#cioarr)"/>
  <text x="843" y="212" text-anchor="middle" font-size="9" fill="#FF3621" font-weight="600">query</text>

  <!-- ===== BOX 4: AI/BI + Notebooks ===== -->
  <g transform="translate(868,100)">
    <rect width="195" height="240" rx="14" fill="#FFFFFF" stroke="#FF8C00" stroke-width="2"/>
    <!-- Header -->
    <rect width="195" height="42" rx="14" fill="#1B3139"/>
    <rect y="22" width="195" height="20" fill="#1B3139"/>
    <polygon points="12,10 21,15.5 12,21 3,15.5" fill="#FF8C00"/>
    <polygon points="23,10 32,15.5 23,21 14,15.5" fill="#FF8C00" opacity="0.8"/>
    <polygon points="17.5,21 26.5,26.5 17.5,32 8.5,26.5" fill="#FF8C00" opacity="0.6"/>
    <text x="38" y="21" font-size="11" font-weight="700" fill="#FFFFFF">AI/BI Dashboard</text>
    <text x="38" y="34" font-size="9" fill="#A0B4C0">Análise de negócio</text>

    <text x="97" y="68" text-anchor="middle" font-size="22">📊</text>
    <text x="97" y="90" text-anchor="middle" font-size="10" font-weight="700" fill="#1B3139">Dashboards ao Vivo</text>
    <text x="97" y="106" text-anchor="middle" font-size="9" fill="#5A6E7F">KPIs de fretes</text>
    <text x="97" y="120" text-anchor="middle" font-size="9" fill="#5A6E7F">Cargas por tipo e UF</text>
    <text x="97" y="134" text-anchor="middle" font-size="9" fill="#5A6E7F">Ticket médio</text>
    <text x="97" y="148" text-anchor="middle" font-size="9" fill="#5A6E7F">Qualidade de dados</text>

    <line x1="14" y1="160" x2="180" y2="160" stroke="#EEF0F4" stroke-width="1"/>

    <text x="97" y="178" text-anchor="middle" font-size="10" font-weight="700" fill="#1B3139">Notebooks</text>
    <text x="97" y="195" text-anchor="middle" font-size="9" fill="#5A6E7F">Geração de dados</text>
    <text x="97" y="209" text-anchor="middle" font-size="9" fill="#5A6E7F">Data quality</text>
    <text x="97" y="223" text-anchor="middle" font-size="9" fill="#5A6E7F">Pipelines de ingestão</text>
  </g>

  <!-- Arrow 4 (back to user - curved bottom) -->
  <path d="M 966 340 Q 966 480 550 490 Q 134 500 134 320" stroke="#5A6E7F" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#cioarr2)"/>
  <text x="550" y="508" text-anchor="middle" font-size="10" fill="#5A6E7F" font-style="italic">resposta + insights para o motorista e gestores</text>

  <!-- Markers -->
  <defs>
    <marker id="cioarr" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#FF3621"/>
    </marker>
    <marker id="cioarr2" markerWidth="8" markerHeight="6" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#5A6E7F"/>
    </marker>
  </defs>

  <!-- Step numbers -->
  <circle cx="222" cy="196" r="11" fill="#FF3621"/>
  <text x="222" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">1</text>
  <circle cx="470" cy="196" r="11" fill="#FF3621"/>
  <text x="470" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">2</text>
  <circle cx="843" cy="196" r="11" fill="#FF3621"/>
  <text x="843" y="200" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">3</text>

  <!-- Bottom tagline -->
  <rect x="20" y="530" width="1060" height="22" rx="6" fill="#1B3139"/>
  <text x="550" y="545" text-anchor="middle" font-size="10" fill="#FFFFFF">Databricks: Apps · Model Serving (Claude Sonnet 4.6 + Whisper large-v3) · Lakebase · Delta Lake · Unity Catalog · SQL Warehouse · AI/BI · MLflow · Notebooks</text>
</svg>
